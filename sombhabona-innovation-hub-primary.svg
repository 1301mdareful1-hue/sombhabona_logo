<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 24px sans-serif; fill: #003DA5; }
    .accent { fill: #FF6B35; }
    .node { fill: #003DA5; }
  </style>
  <rect width="100%" height="100%" fill="white" />
  <g transform="translate(50, 100)">
    <circle cx="50" cy="50" r="30" class="node" />
    <text x="60" y="10" class="title">Sombhabona Innovation Hub</text>
    <line x1="50" y1="50" x2="100" y2="50" stroke="#003DA5" stroke-width="3" />
    <circle cx="100" cy="50" r="10" class="node accent" />
    <line x1="50" y1="50" x2="75" y2="75" stroke="#003DA5" stroke-width="3" />
    <circle cx="75" cy="75" r="10" class="node accent" />
  </g>
</svg>